<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TuneShift</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #f5efe3;
        color: #1d1d1d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        background:
          radial-gradient(circle at top right, rgba(201, 125, 36, 0.22), transparent 42%),
          linear-gradient(180deg, #f9f4ea 0%, #eadfce 100%);
      }

      main {
        padding: 18px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(116, 82, 25, 0.12);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 16px;
        font-size: 22px;
        letter-spacing: 0.03em;
      }

      .panel {
        padding: 14px;
        border: 1px solid rgba(29, 29, 29, 0.12);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 12px 28px rgba(61, 43, 14, 0.08);
      }

      .transport {
        display: grid;
        grid-template-columns: 52px 1fr 52px;
        gap: 10px;
        align-items: center;
      }

      button {
        appearance: none;
        border: none;
        border-radius: 14px;
        background: #2d2a26;
        color: #f7f1e6;
        cursor: pointer;
        font: inherit;
      }

      .step-button {
        height: 52px;
        font-size: 26px;
        line-height: 1;
      }

      .step-button:disabled,
      .toggle-button:disabled,
      .reset-button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .value-card {
        padding: 10px 12px;
        border-radius: 14px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(239, 228, 210, 0.95));
        text-align: center;
      }

      .value-label {
        margin: 0;
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #6c6153;
      }

      .value-text {
        margin: 6px 0 0;
        font-size: 32px;
        font-weight: 700;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        margin-top: 12px;
      }

      .toggle-button {
        padding: 12px 16px;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .toggle-button.on {
        background: #2d6f3e;
      }

      .reset-button {
        padding: 12px 14px;
        background: rgba(45, 42, 38, 0.16);
        color: #2d2a26;
        font-size: 13px;
        font-weight: 700;
      }

      .status-panel {
        margin-top: 14px;
      }

      .status-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #8e877d;
      }

      .status-dot.ready {
        background: #2d6f3e;
      }

      .status-copy {
        flex: 1;
      }

      .status-label {
        font-size: 12px;
        color: #6c6153;
      }

      .status-text {
        margin: 2px 0 0;
        font-size: 14px;
        font-weight: 700;
      }

      dl {
        margin: 0;
        display: grid;
        grid-template-columns: 94px 1fr;
        gap: 6px 8px;
        font-size: 12px;
      }

      dt {
        color: #6c6153;
      }

      dd {
        margin: 0;
        word-break: break-word;
      }

      .hint {
        margin: 12px 0 0;
        font-size: 12px;
        line-height: 1.45;
        color: #6c6153;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">TuneShift MVP</div>
      <h1>YouTube Pitch Shift</h1>

      <section class="panel">
        <div class="transport">
          <button id="decrease-button" class="step-button" type="button" aria-label="Decrease semitone">-</button>
          <div class="value-card">
            <p class="value-label">Semitones</p>
            <p id="semitone-value" class="value-text">0</p>
          </div>
          <button id="increase-button" class="step-button" type="button" aria-label="Increase semitone">+</button>
        </div>

        <div class="controls">
          <button id="toggle-button" class="toggle-button" type="button">Turn On</button>
          <button id="reset-button" class="reset-button" type="button">Reset</button>
        </div>
      </section>

      <section class="panel status-panel">
        <div class="status-row">
          <span id="status-dot" class="status-dot"></span>
          <div class="status-copy">
            <div class="status-label">Pipeline status</div>
            <p id="status-text" class="status-text">Checking active tab...</p>
          </div>
        </div>

        <dl>
          <dt>Detected</dt>
          <dd id="detected-value">-</dd>

          <dt>ReadyState</dt>
          <dd id="ready-state-value">-</dd>

          <dt>Buffered</dt>
          <dd id="buffered-value">-</dd>

          <dt>Video Src</dt>
          <dd id="src-value">-</dd>
        </dl>

        <p id="hint-text" class="hint">
          Open a YouTube watch page, start playback, then use the controls above to shift the song by semitone steps.
        </p>
      </section>
    </main>

    <script src="lib/tuneshift-core.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
