<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TuneShift</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #f5efe3;
        color: #1d1d1d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        background:
          radial-gradient(circle at top right, rgba(201, 125, 36, 0.22), transparent 42%),
          linear-gradient(180deg, #f9f4ea 0%, #eadfce 100%);
      }

      main {
        padding: 18px;
      }

      .header {
        margin-bottom: 16px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        letter-spacing: 0.04em;
      }

      .subtitle {
        margin: 6px 0 0;
        font-size: 13px;
        color: #6c6153;
      }

      .panel {
        padding: 14px;
        border: 1px solid rgba(29, 29, 29, 0.12);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 12px 28px rgba(61, 43, 14, 0.08);
      }

      .control-stack {
        display: grid;
        gap: 14px;
      }

      .control-group {
        display: grid;
        gap: 10px;
      }

      .group-header {
        display: grid;
        gap: 2px;
      }

      .group-title {
        margin: 0;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #6c6153;
      }

      .group-copy {
        margin: 0;
        font-size: 12px;
        color: #6c6153;
      }

      .transport {
        display: grid;
        grid-template-columns: 52px 1fr 52px;
        gap: 10px;
        align-items: center;
      }

      button {
        appearance: none;
        border: none;
        border-radius: 14px;
        background: #2d2a26;
        color: #f7f1e6;
        cursor: pointer;
        font: inherit;
      }

      .step-button {
        height: 52px;
        font-size: 26px;
        line-height: 1;
      }

      .step-button:disabled,
      .power-button:disabled,
      .reset-button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .value-card {
        padding: 10px 12px;
        border-radius: 14px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(239, 228, 210, 0.95));
        text-align: center;
      }

      .value-label {
        margin: 0;
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #6c6153;
      }

      .value-text {
        margin: 6px 0 0;
        font-size: 32px;
        font-weight: 700;
      }

      .controls {
        display: grid;
        grid-template-columns: 58px 1fr;
        gap: 10px;
        align-items: center;
      }

      .power-button {
        width: 58px;
        height: 58px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: rgba(45, 42, 38, 0.92);
        color: #f7f1e6;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 10px 18px rgba(61, 43, 14, 0.12);
      }

      .power-button.on {
        background: linear-gradient(180deg, #d65b52 0%, #b2362e 100%);
        box-shadow: 0 12px 24px rgba(179, 54, 46, 0.28);
      }

      .power-icon {
        width: 24px;
        height: 24px;
        stroke: currentColor;
        fill: none;
        stroke-width: 5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .reset-button {
        padding: 12px 14px;
        background: rgba(45, 42, 38, 0.16);
        color: #2d2a26;
        font-size: 13px;
        font-weight: 700;
      }

      .status-note {
        margin-top: 14px;
        display: flex;
        gap: 8px;
        align-items: flex-start;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.58);
        border: 1px solid rgba(29, 29, 29, 0.08);
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #8e877d;
        flex: 0 0 auto;
        margin-top: 4px;
      }

      .status-dot.ready {
        background: #2d6f3e;
      }

      .status-text {
        font-size: 12px;
        margin: 0;
        line-height: 1.45;
        color: #6c6153;
      }
    </style>
  </head>
  <body>
    <main>
      <header class="header">
        <h1>TuneShift</h1>
        <p class="subtitle">Pitch and tempo controls for YouTube.</p>
      </header>

      <section class="panel">
        <div class="control-stack">
          <div class="control-group">
            <div class="group-header">
              <p class="group-title">Pitch</p>
              <p class="group-copy">Shift the key in semitone steps.</p>
            </div>

            <div class="transport">
              <button id="decrease-button" class="step-button" type="button" aria-label="Decrease semitone">-</button>
              <div class="value-card">
                <p class="value-label">Semitones</p>
                <p id="semitone-value" class="value-text">0</p>
              </div>
              <button id="increase-button" class="step-button" type="button" aria-label="Increase semitone">+</button>
            </div>
          </div>

          <div class="control-group">
            <div class="group-header">
              <p class="group-title">Tempo</p>
              <p class="group-copy">Change playback speed without changing pitch.</p>
            </div>

            <div class="transport">
              <button id="tempo-decrease-button" class="step-button" type="button" aria-label="Decrease playback speed">-</button>
              <div class="value-card">
                <p class="value-label">Playback</p>
                <p id="tempo-value" class="value-text">1x</p>
              </div>
              <button id="tempo-increase-button" class="step-button" type="button" aria-label="Increase playback speed">+</button>
            </div>
          </div>

          <div class="controls">
            <button
              id="toggle-button"
              class="power-button"
              type="button"
              aria-label="Turn TuneShift on"
              aria-pressed="false"
              title="Turn TuneShift on"
            >
              <svg class="power-icon" viewBox="0 0 64 64" aria-hidden="true">
                <path d="M32 10v18"></path>
                <path d="M20 18a20 20 0 1 0 24 0"></path>
              </svg>
            </button>
            <button id="reset-button" class="reset-button" type="button">Reset All</button>
          </div>
        </div>

        <div class="status-note">
          <span id="status-dot" class="status-dot"></span>
          <p id="status-text" class="status-text">Checking active tab...</p>
        </div>
      </section>
    </main>

    <script src="lib/tuneshift-core.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
