<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TuneShift</title>
    <style>
      @font-face {
        font-family: "Space Grotesk";
        src: url("./assets/fonts/SpaceGrotesk-Latin.woff2") format("woff2");
        font-style: normal;
        font-weight: 400 700;
      }

      @font-face {
        font-family: "Space Mono";
        src: url("./assets/fonts/SpaceMono-Regular-Latin.woff2") format("woff2");
        font-style: normal;
        font-weight: 400;
      }

      @font-face {
        font-family: "Space Mono";
        src: url("./assets/fonts/SpaceMono-Bold-Latin.woff2") format("woff2");
        font-style: normal;
        font-weight: 700;
      }

      :root {
        --radius-sm: 8px;
        --radius-md: 16px;
        --radius-lg: 24px;
        --radius-pill: 999px;
        --shadow-light: 0 12px 28px rgba(0, 0, 0, 0.08);
        --shadow-dark: 0 16px 32px rgba(0, 0, 0, 0.35);
        --shadow-press: inset 0 1px 0 rgba(255, 255, 255, 0.04);
        --ease: 160ms ease;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-width: 340px;
      }

      body {
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        transition: background-color var(--ease), color var(--ease);
      }

      body[data-theme="dark"] {
        color-scheme: dark;
        --bg: #111111;
        --bg-accent: rgba(255, 255, 255, 0.06);
        --panel: #1e1e1e;
        --panel-muted: #202020;
        --panel-strong: #2d2d2d;
        --border: rgba(255, 255, 255, 0.08);
        --border-strong: rgba(255, 255, 255, 0.14);
        --text: #f5f5f5;
        --text-muted: #c0c5ce;
        --text-soft: #9ca3af;
        --status-bg: rgba(255, 255, 255, 0.03);
        --button-bg: #1f1f1f;
        --button-hover: #333333;
        --button-disabled: rgba(255, 255, 255, 0.06);
        --power-off: #202020;
        --reset-bg: #2a2a2a;
        --reset-text: #f5f5f5;
        --surface-shadow: var(--shadow-dark);
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.07), transparent 44%),
          linear-gradient(180deg, #111111 0%, #171717 100%);
      }

      body[data-theme="light"] {
        color-scheme: light;
        --bg: #f5f5f5;
        --bg-accent: rgba(17, 17, 17, 0.04);
        --panel: rgba(255, 255, 255, 0.9);
        --panel-muted: #f8f6f2;
        --panel-strong: #ffffff;
        --border: rgba(32, 32, 32, 0.1);
        --border-strong: rgba(32, 32, 32, 0.14);
        --text: #111111;
        --text-muted: #51545b;
        --text-soft: #9ca3af;
        --status-bg: rgba(17, 17, 17, 0.03);
        --button-bg: #fbf9f5;
        --button-hover: #f0ebe4;
        --button-disabled: rgba(17, 17, 17, 0.05);
        --power-off: #ffffff;
        --reset-bg: #f1ede6;
        --reset-text: #111111;
        --surface-shadow: var(--shadow-light);
        background:
          radial-gradient(circle at top left, rgba(255, 211, 61, 0.22), transparent 42%),
          linear-gradient(180deg, #fbf8f2 0%, #f4f1ea 100%);
      }

      main {
        padding: 18px;
        background: transparent;
        color: var(--text);
      }

      .shell {
        display: grid;
        gap: 14px;
      }

      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .brand {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        min-width: 0;
      }

      .brand-mark {
        width: 34px;
        height: 34px;
        flex: 0 0 auto;
        display: block;
        background: currentColor;
        -webkit-mask: url("./assets/icons/icon-48.png") center / contain no-repeat;
        mask: url("./assets/icons/icon-48.png") center / contain no-repeat;
        transform: translateY(-3px);
      }

      .brand-copy {
        min-width: 0;
      }

      .brand-title {
        margin: 0;
        font-size: 24px;
        line-height: 1;
        letter-spacing: 0.03em;
        font-weight: 500;
      }

      .brand-subtitle {
        margin: 6px 0 0;
        font-size: 11px;
        line-height: 1.4;
        color: var(--text-muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .icon-button {
        width: 34px;
        height: 34px;
        display: grid;
        place-items: center;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--panel);
        color: var(--text);
        box-shadow: var(--shadow-press);
      }

      .icon-button:hover:not(:disabled),
      .step-button:hover:not(:disabled),
      .reset-button:hover:not(:disabled) {
        background: var(--button-hover);
      }

      button {
        appearance: none;
        border: 1px solid transparent;
        cursor: pointer;
        font: inherit;
        transition:
          transform var(--ease),
          background-color var(--ease),
          border-color var(--ease),
          color var(--ease),
          box-shadow var(--ease),
          opacity var(--ease);
      }

      button:active:not(:disabled) {
        transform: translateY(1px);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.48;
      }

      .theme-icon {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .theme-icon-moon {
        display: none;
      }

      body[data-theme="light"] .theme-icon-sun {
        display: none;
      }

      body[data-theme="light"] .theme-icon-moon {
        display: block;
      }

      .panel {
        display: grid;
        gap: 10px;
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        background:
          linear-gradient(180deg, var(--panel) 0%, var(--panel-muted) 100%);
        box-shadow: var(--surface-shadow);
        padding: 16px;
      }

      .control-stack {
        display: grid;
        gap: 14px;
      }

      .control-group {
        display: grid;
        gap: 8px;
      }

      .group-title {
        margin: 0;
        color: var(--text-muted);
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .stepper {
        display: grid;
        grid-template-columns: 48px 1fr 48px;
        gap: 0;
        min-height: 72px;
        border: 1px solid var(--border-strong);
        border-radius: var(--radius-md);
        overflow: hidden;
        background: var(--panel-strong);
      }

      .step-button {
        background: transparent;
        color: var(--text);
        font-size: 28px;
      }

      .step-button:first-child {
        border-right: 1px solid var(--border);
      }

      .step-button:last-child {
        border-left: 1px solid var(--border);
      }

      .value-card {
        display: grid;
        place-items: center;
        gap: 4px;
        padding: 12px 6px;
      }

      .value-text {
        margin: 0;
        font-family: "Space Mono", monospace;
        font-size: 28px;
        font-weight: 700;
        line-height: 1;
        letter-spacing: -0.02em;
      }

      .value-label {
        margin: 0;
        font-family: "Space Mono", monospace;
        font-size: 10px;
        line-height: 1;
        color: var(--text-muted);
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .controls {
        display: grid;
        grid-template-columns: 52px 1fr;
        gap: 10px;
      }

      .power-button {
        width: 52px;
        height: 52px;
        display: grid;
        place-items: center;
        border-radius: 16px;
        background: var(--power-off);
        color: var(--text);
        border-color: var(--border-strong);
        box-shadow: var(--shadow-press);
      }

      .power-button.on {
        background: linear-gradient(180deg, #df6056 0%, #b3362e 100%);
        border-color: rgba(223, 96, 86, 0.8);
        color: #ffffff;
        box-shadow: 0 8px 22px rgba(179, 54, 46, 0.34);
      }

      .power-icon {
        width: 22px;
        height: 22px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2.4;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .reset-button {
        border-radius: 16px;
        background: var(--reset-bg);
        border-color: var(--border);
        color: var(--reset-text);
        font-size: 13px;
        font-weight: 500;
      }

      .status-note {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 42px;
        padding: 11px 14px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: var(--status-bg);
      }

      .status-note.active {
        border-color: rgba(34, 197, 94, 0.28);
      }

      .status-note.warning {
        border-color: rgba(255, 211, 61, 0.32);
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        flex: 0 0 auto;
        background: #9ca3af;
      }

      .status-note.active .status-dot {
        background: #22c55e;
      }

      .status-note.warning .status-dot {
        background: #ffd33d;
      }

      .status-note.inactive .status-dot {
        background: #9ca3af;
      }

      .status-text {
        margin: 0;
        font-family: "Space Mono", monospace;
        font-size: 11px;
        line-height: 1.35;
        color: var(--text-muted);
      }
    </style>
  </head>
  <body data-theme="dark">
    <main>
      <div class="shell">
        <header class="topbar">
          <div class="brand">
            <span class="brand-mark" aria-hidden="true"></span>
            <div class="brand-copy">
              <h1 class="brand-title">TuneShift</h1>
              <p class="brand-subtitle">Pitch and tempo control</p>
            </div>
          </div>

          <button
            id="theme-button"
            class="icon-button"
            type="button"
            aria-label="Switch to light theme"
            title="Switch to light theme"
          >
            <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="3.8"></circle>
              <path d="M12 2.5v2.2"></path>
              <path d="M12 19.3v2.2"></path>
              <path d="M2.5 12h2.2"></path>
              <path d="M19.3 12h2.2"></path>
              <path d="M5.4 5.4l1.6 1.6"></path>
              <path d="M17 17l1.6 1.6"></path>
              <path d="M18.6 5.4L17 7"></path>
              <path d="M7 17l-1.6 1.6"></path>
            </svg>
            <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18.5 14.4A7.5 7.5 0 0 1 9.6 5.5a8.4 8.4 0 1 0 8.9 8.9Z"></path>
            </svg>
          </button>
        </header>

        <section class="panel">
          <div class="control-stack">
            <div class="control-group">
              <p class="group-title">Pitch</p>
              <div class="stepper">
                <button id="decrease-button" class="step-button" type="button" aria-label="Decrease semitone">&minus;</button>
                <div class="value-card">
                  <p id="semitone-value" class="value-text">0</p>
                  <p class="value-label">Semitones</p>
                </div>
                <button id="increase-button" class="step-button" type="button" aria-label="Increase semitone">+</button>
              </div>
            </div>

            <div class="control-group">
              <p class="group-title">Speed</p>
              <div class="stepper">
                <button id="tempo-decrease-button" class="step-button" type="button" aria-label="Decrease playback speed">&minus;</button>
                <div class="value-card">
                  <p id="tempo-value" class="value-text">1x</p>
                  <p class="value-label">Playback</p>
                </div>
                <button id="tempo-increase-button" class="step-button" type="button" aria-label="Increase playback speed">+</button>
              </div>
            </div>

            <div class="controls">
              <button
                id="toggle-button"
                class="power-button"
                type="button"
                aria-label="Turn TuneShift on"
                aria-pressed="false"
                title="Turn TuneShift on"
              >
                <svg class="power-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 3.2v6.3"></path>
                  <path d="M7.4 5.6a8 8 0 1 0 9.2 0"></path>
                </svg>
              </button>
              <button id="reset-button" class="reset-button" type="button">Reset All</button>
            </div>
          </div>

          <div id="status-note" class="status-note inactive">
            <span id="status-dot" class="status-dot"></span>
            <p id="status-text" class="status-text">Inactive</p>
          </div>
        </section>
      </div>
    </main>

    <script src="lib/tuneshift-core.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
